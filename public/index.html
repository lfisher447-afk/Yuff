<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuff Proxy Browser</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="browser-header">
        <div class="tab-bar" id="tabBar">
            <button class="new-tab-btn" onclick="app.createTab()"><i class="fas fa-plus"></i></button>
        </div>
        <div class="nav-bar">
            <button onclick="app.goBack()"><i class="fas fa-arrow-left"></i></button>
            <button onclick="app.goForward()"><i class="fas fa-arrow-right"></i></button>
            <button onclick="app.reloadTab()"><i class="fas fa-redo"></i></button>
            <input type="text" id="globalUrlInput" placeholder="Enter URL or Extractor link...">
            <button onclick="app.openSettings()"><i class="fas fa-cog"></i> Settings</button>
            <button onclick="app.toggleSidebar()"><i class="fas fa-robot"></i> AI</button>
        </div>
    </div>

    <div class="workspace">
        <div class="tab-contents" id="tabContents"></div>
        
        <div class="ai-sidebar" id="aiSidebar">
            <div class="sidebar-header">
                <h3>Yuff AI</h3>
                <button onclick="app.toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <div class="chat-history" id="chatHistory"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ask AI...">
                <button onclick="app.sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>System Settings</h2>
            <div class="settings-grid">
                <div class="setting-group">
                    <label>Proxy Engine Routing</label>
                    <select id="setEngine">
                        <option value="standard">Server-Side: Node HTTP</option>
                        <option value="libcurl">Server-Side: Libcurl (Spoofed)</option>
                        <option value="scramjet">Client-Side: Scramjet WASM (Local)</option>
                        <option value="baremux">Client-Side: Baremux + Epoxy</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Anti-Detection (Spoofing)</label>
                    <select id="setSpoof">
                        <option value="high">High (Rotate User-Agent & Headers)</option>
                        <option value="off">Off</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Custom Elements (CSS Selectors to Block)</label>
                    <input type="text" id="setCustomElements" placeholder=".ad-banner, #popup-modal">
                </div>
                <div class="setting-group">
                    <label>AI API URL</label>
                    <input type="text" id="setAiUrl" value="https://api.openai.com/v1/chat/completions">
                </div>
                <div class="setting-group">
                    <label>AI API Key</label>
                    <input type="password" id="setAiKey" placeholder="sk-...">
                </div>
            </div>
            <button class="btn" style="margin-top: 15px;" onclick="app.saveSettings()">Save Configuration</button>
        </div>
    </div>

    <!-- Extractor Template per Tab -->
    <template id="tab-template">
        <div class="container extractor-ui">
            <div class="header">
                <h1>Stream Iframe Extractor</h1>
                <p>Educational tool for analyzing embedded video players</p>
            </div>
            <div style="background: #ffffff; padding: 16px; margin: 20px 0; border-radius: 12px; border: 2px solid #ff3b30;">
                <h3 style="margin-top: 0; font-size: 17px; color: #ff3b30;">⚖️ Legal Terms & Acceptable Use</h3>
                <p style="font-size: 14px; color: #1d1d1f;">By clicking "I Agree", you warrant you own the content or have permission.</p>
            </div>
            <div class="input-section">
                <div class="input-group">
                    <input type="text" class="urlInput" placeholder="Enter webpage URL...">
                    <button class="btn analyzeBtn" disabled style="opacity: 0.5;">I Agree—Analyze Page</button>
                </div>
                <div style="margin-top: 14px; padding: 12px; background: #f5f5f7; border-radius: 10px;">
                    <label style="display: flex; align-items: flex-start; cursor: pointer; font-size: 14px;">
                        <input type="checkbox" class="consentCheckbox" style="margin-right: 10px;">
                        <span><strong>I confirm</strong> I own the content or have permission...</span>
                    </label>
                </div>
            </div>
            <div class="loading" style="display:none;"><div class="spinner"></div><p>Analyzing...</p></div>
            <div class="error" style="display:none;"></div>
            <div class="player-section" style="display:none;">
                <h2 class="streamTitle">Stream Viewer</h2>
                <div class="stream-selector" style="display: none;">
                    <label>Select Stream:</label>
                    <select class="streamSelect"></select>
                </div>
                <div class="playerContainer player-container"></div>
                <div class="blockMonitor" style="display:none; margin-top: 15px; padding: 15px; border: 1px solid #d2d2d7; border-radius: 8px;">
                    <h3 style="color:#1d1d1f; margin-bottom: 10px;">Blocked Threats: <span class="blockCount" style="color:red">0</span></h3>
                    <div class="blockList"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Client-Side Engine Loaders -->
    <script src="/baremux/index.js" defer></script>
    <script src="/epoxy/index.js" defer></script>
    <script src="/scram/scramjet.bundle.js" defer></script>
    
    <script src="/app.js"></script>
</body>
</html>
